# Workflow to run the FTorch test suite
name: Test suite (Windows CPU)

# Controls when the workflow will run
on:
  # Triggers the workflow on pushes to the "main" branch, i.e., PR merges
  push:
    branches: [ "main" ]

  # Triggers the workflow on pushes to open pull requests with changes to this workflow
  pull_request:
    paths:
      # This workflow
      - '.github/workflows/test_suite_windows_cpu_intel.yml'
      # Source files
      - '**.c'
      - '**.cpp'
      - '**.fypp'
      - '**.f90'
      - '**.F90'
      - '**.py'
      # Unit tests
      - '**.pf'
      # Build system
      - '**CMakeLists.txt'
      - '**requirements.txt'
      # Data
      - '**data/*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Cancel jobs running if new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Write permissions are not required
permissions: {}

# Workflow run - one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test-suite-windows"
  test-suite:
    name: ifx ${{ matrix.toolchain.version }}, ${{ matrix.std }}

    # The type of runner that the job will run on
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - {compiler: intel, version: '2023.2'}
        std: [f08]

    # Terminate the job if it runs for more than 15 minutes
    timeout-minutes: 15

    steps:
      # configure windows VM with intel compilers
      - name: Setup Fortran
        uses: fortran-lang/setup-fortran@2a1b9c55897d827a9dfeb114408f3615e53b2b72 # v1.9.0
        id: setup-fortran
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Add Intel oneAPI compiler to PATH
        shell: pwsh
        run: |
          # setup-fortran exports CMPLR_ROOT but does not add compiler binaries to PATH.
          # On oneAPI 2023.x Windows, ifx/icx live in $CMPLR_ROOT\windows\bin.
          # On oneAPI 2024+, they live in $CMPLR_ROOT\bin.  Add both if they exist.
          foreach ($dir in @("$env:CMPLR_ROOT\windows\bin", "$env:CMPLR_ROOT\bin")) {
            if (Test-Path $dir) { $dir | Out-File -Append $env:GITHUB_PATH -Encoding utf8 }
          }

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout FTorch repository
        with:
          persist-credentials: true
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'  # Use 3.13 as no PyTorch wheels for 3.14 yet.

      - name: Install ftorch_utils
        shell: pwsh
        run: |
          pip install --upgrade pip
          python -m venv ftorch
          .\ftorch\Scripts\Activate.ps1
          pip install . --group test

      - name: Build FTorch
        shell: pwsh
        run: |
          .\ftorch\Scripts\Activate.ps1
          # Find Python executable in venv
          $PYTHON_EXECUTABLE = python -c "import sys; print(sys.executable)"
          # Find torch location
          $Torch_DIR = (pip show torch | Select-String -Pattern "^Location" | ForEach-Object { $_.Line -replace "^Location:\s*", "" })
          # Set install location
          $FTORCH_INSTALL_DIR = "$env:TEMP\ftorch-install"
          cmake `
            -S . `
            -B build `
            -G "Ninja" `
            -DPython_EXECUTABLE="$PYTHON_EXECUTABLE" `
            -DCMAKE_Fortran_FLAGS="/stand:08 /fpscomp:logicals" `
            -DCMAKE_CXX_FLAGS="/D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH" `
            -DCMAKE_PREFIX_PATH="$Torch_DIR\torch" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_Fortran_COMPILER=ifx `
            -DCMAKE_C_COMPILER=icx `
            -DCMAKE_CXX_COMPILER=icx `
            -DCMAKE_BUILD_TESTS=TRUE `
            -DCMAKE_INSTALL_PREFIX="$FTORCH_INSTALL_DIR"
          cmake --build build --config Release --parallel
          cmake --install build

      - name: Run Python unit tests
        shell: pwsh
        run: |
          .\ftorch\Scripts\Activate.ps1
          pytest --verbose test/ftorch_utils

      - name: Integration tests
        shell: pwsh
        run: |
          .\ftorch\Scripts\Activate.ps1
          $Torch_DIR = (pip show torch | Select-String -Pattern "^Location" | ForEach-Object { $_.Line -replace "^Location:\s*", "" })
          # Set install location
          $FTORCH_INSTALL_DIR = "$env:TEMP\ftorch-install"
          # Add FTorch and PyTorch to the path for the test executables
          $env:PATH = "$FTORCH_INSTALL_DIR\bin;$Torch_DIR\torch\lib;$env:PATH"
          ctest --test-dir build --verbose --output-on-failure --tests-regex "example_tensor|example_simplenet|example_resnet|example_multiio|example_autograd"

      - name: Standalone SimpleNet example
        shell: pwsh
        run: |
          .\ftorch\Scripts\Activate.ps1
          # Find Python executable in venv
          $PYTHON_EXECUTABLE = python -c "import sys; print(sys.executable)"
          # Find torch location
          $Torch_DIR = (pip show torch | Select-String -Pattern "^Location" | ForEach-Object { $_.Line -replace "^Location:\s*", "" })
          # Set install location
          $FTORCH_INSTALL_DIR = "$env:TEMP\ftorch-install"
          # Add FTorch and PyTorch to the path for the test executables
          $env:PATH = "$FTORCH_INSTALL_DIR\bin;$Torch_DIR\torch\lib;$env:PATH"
          cmake `
            -S examples\02_SimpleNet `
            -B examples\02_SimpleNet\build `
            -G "Ninja" `
            -DCMAKE_Fortran_COMPILER=ifx `
            -DCMAKE_C_COMPILER=icx `
            -DCMAKE_CXX_COMPILER=icx `
            -DCMAKE_Fortran_FLAGS="/stand:08 /fpscomp:logicals" `
            -DPython_EXECUTABLE="$PYTHON_EXECUTABLE" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$FTORCH_INSTALL_DIR;$Torch_DIR\torch" `
            -DCMAKE_BUILD_TESTS=TRUE
          cmake --build examples\02_SimpleNet\build --config Release --parallel
          ctest --test-dir examples\02_SimpleNet\build -V --output-on-failure
